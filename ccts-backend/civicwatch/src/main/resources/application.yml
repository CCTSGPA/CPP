# Server Configuration
server:
  port: 8081
  servlet:
    context-path: /

# Application Configuration
spring:
  application:
    name: corruption-complaint-system
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties],optional:file:ccts-backend/.env[.properties],optional:file:ccts-backend/civicwatch/.env[.properties]
  main:
    allow-circular-references: true

  # Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:${SPRING_DATASOURCE_HOST:localhost}}:${DB_PORT:${SPRING_DATASOURCE_PORT:3306}}/${DB_NAME:${SPRING_DATASOURCE_DB:corruption_db}}?createDatabaseIfNotExist=${DB_CREATE_IF_NOT_EXISTS:false}&useSSL=${DB_SSL_ENABLED:false}&requireSSL=${DB_REQUIRE_SSL:false}&verifyServerCertificate=${DB_VERIFY_SERVER_CERT:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=${DB_SERVER_TIMEZONE:UTC}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
        query:
          fail_on_pagination_over_collection_fetch: true

  cache:
    type: simple
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration (Base64 encoded secret key)
jwt:
  secret: ${JWT_SECRET:}
  expiration: 3600000  # 1 hour in milliseconds
  refresh-expiration: 604800000  # 7 days

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}

# SendGrid Configuration
sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@civicwatch.com}
  from-name: ${SENDGRID_FROM_NAME:CivicWatch}

# Notification Settings
notification:
  enabled: true
  admin-email: ${ADMIN_EMAIL:admin@civicwatch.com}
  admin-phone: ${ADMIN_PHONE:+1234567890}
  send-on-complaint-submit: true
  send-on-status-update: true
  send-on-assignment: true

# OAuth2 Configuration
oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:your_google_client_id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your_google_client_secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:${OAUTH_REDIRECT_BASE_URL:http://localhost:3000}/auth/google/callback}

  facebook:
    client-id: ${FACEBOOK_APP_ID:your_facebook_app_id}
    client-secret: ${FACEBOOK_APP_SECRET:your_facebook_app_secret}
    redirect-uri: ${FACEBOOK_REDIRECT_URI:${OAUTH_REDIRECT_BASE_URL:http://localhost:3000}/auth/facebook/callback}

  apple:
    client-id: ${APPLE_SERVICES_ID:your_apple_services_id}
    team-id: ${APPLE_TEAM_ID:your_apple_team_id}
    key-id: ${APPLE_KEY_ID:your_apple_key_id}
    private-key: ${APPLE_PRIVATE_KEY:your_apple_private_key}
    redirect-uri: ${APPLE_REDIRECT_URI:${OAUTH_REDIRECT_BASE_URL:http://localhost:3000}/auth/apple/callback}

  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:your_microsoft_client_id}
    client-secret: ${MICROSOFT_CLIENT_SECRET:your_microsoft_client_secret}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:${OAUTH_REDIRECT_BASE_URL:http://localhost:3000}/auth/microsoft/callback}

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# File Upload Directory
file:
  upload-dir: ./uploads/evidence

# Logging
logging:
  level:
    root: INFO
    "[com.ccts]": INFO
    "[org.springframework.security]": INFO

# Cloudflare Turnstile Configuration
cloudflare:
  turnstile:
    enabled: ${CLOUDFLARE_TURNSTILE_ENABLED:false}
    site-key: ${CLOUDFLARE_TURNSTILE_SITE_KEY:}
    secret-key: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:}
